name: Cloudsmith CI Demo

on:
  push:
    branches: ["main"]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils

      - name: Install Cloudsmith CLI
        run: |
          pip install --upgrade cloudsmith-cli

      - name: Generate version for this build
        id: version_step
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build artifact (ELF + HEX)
        run: |
          mkdir -p dist
          make -f session5.mk all

      - name: Upload ELF artifact to Cloudsmith
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          OWNER: adi
          REPOSITORY: sdp-devops-workshop
          VERSION: ${{ steps.version_step.outputs.version }}
        run: |
          echo "Uploading ELF artifact version: $VERSION"

          cloudsmith push raw \
            "$OWNER/$REPOSITORY" \
            --version "$VERSION" \
            --tags "elf,ci-build" \
            dist/program.elf

      - name: Upload HEX artifact to Cloudsmith
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          OWNER: adi
          REPOSITORY: sdp-devops-workshop
          VERSION: ${{ steps.version_step.outputs.version }}
        run: |
          echo "Uploading HEX artifact version: $VERSION"

          cloudsmith push raw \
            "$OWNER/$REPOSITORY" \
            --version "$VERSION" \
            --tags "hex,ci-build" \
            dist/program.hex
