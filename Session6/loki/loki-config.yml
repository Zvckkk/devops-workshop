# Loki Configuration
# Simple configuration optimized for workshop/development use

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

# Common configuration shared by multiple components
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Query frontend for query optimization
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Schema configuration
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Storage configuration
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

# Limits configuration
limits_config:
  # Retention period (15 days to match Prometheus)
  retention_period: 360h

  # Ingestion limits
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 24
  max_streams_per_user: 10000
  max_global_streams_per_user: 0

  # Query limits
  max_query_length: 721h
  max_query_lookback: 0
  max_entries_limit_per_query: 5000

  # Line size limits
  max_line_size: 256KB
  max_line_size_truncate: false

# Compaction configuration
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# Analytics (disabled for privacy)
analytics:
  reporting_enabled: false
