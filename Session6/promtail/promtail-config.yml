# Promtail Configuration
# Configured to collect host dmesg logs and Docker container logs

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

# Where to send logs (Loki endpoint)
clients:
  - url: http://loki:3100/loki/api/v1/push

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  # ============================================
  # KERNEL LOGS (dmesg)
  # ============================================
  # Scrape kernel messages from syslog
  - job_name: kernel
    static_configs:
      - targets:
          - localhost
        labels:
          job: kernel
          host: ${HOSTNAME}
          __path__: /var/log/syslog

    # Filter only kernel messages
    pipeline_stages:
      - match:
          selector: '{job="kernel"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+kernel:\s*(\[(?P<kernel_time>[^\]]+)\])?\s*(?P<message>.*)$'
            - labels:
                kernel_time:
            - timestamp:
                source: timestamp
                format: Jan 02 15:04:05
            - output:
                source: message

  # ============================================
  # ALTERNATE: Read kernel logs directly
  # ============================================
  # If /var/log/kern.log exists (Debian/Ubuntu)
  - job_name: kern_log
    static_configs:
      - targets:
          - localhost
        labels:
          job: kern
          host: ${HOSTNAME}
          __path__: /var/log/kern.log

    pipeline_stages:
      - match:
          selector: '{job="kern"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+kernel:\s*(\[(?P<kernel_time>[^\]]+)\])?\s*(?P<message>.*)$'
            - labels:
                kernel_time:
            - timestamp:
                source: timestamp
                format: Jan 02 15:04:05

  # ============================================
  # SYSTEM LOGS (general syslog)
  # ============================================
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: ${HOSTNAME}
          __path__: /var/log/syslog

    pipeline_stages:
      - match:
          selector: '{job="syslog"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<service>[^\[:\s]+)(\[(?P<pid>\d+)\])?:\s*(?P<message>.*)$'
            - labels:
                service:
                pid:
            - timestamp:
                source: timestamp
                format: Jan 02 15:04:05

  # ============================================
  # DOCKER CONTAINER LOGS
  # ============================================
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: ${HOSTNAME}
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse Docker JSON log format
      - json:
          expressions:
            output: log
            stream: stream
            time: time

      # Extract container information from file path
      - regex:
          source: filename
          expression: '/var/lib/docker/containers/(?P<container_id>[^/]+)/.*'

      - labels:
          stream:
          container_id:

      - timestamp:
          source: time
          format: RFC3339Nano

      - output:
          source: output

# Limit resource usage
limits_config:
  # Maximum read rate (16MB/s)
  readline_rate: 16777216

  # Maximum burst size (24MB)
  readline_burst: 25165824
